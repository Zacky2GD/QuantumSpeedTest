<script>
        // --- DOM Elements ---
        const splash = document.getElementById('splash');
        const app = document.getElementById('app');
        const btnStart = document.getElementById('btn-start');
        const btnFullscreen = document.getElementById('btn-fullscreen');
        const clockEl = document.getElementById('clock');
        const batteryEl = document.getElementById('battery');
        const statusText = document.getElementById('status-text');
        
        const vals = {
            ping: document.getElementById('val-ping'),
            jitter: document.getElementById('val-jitter'),
            down: document.getElementById('val-down'),
            up: document.getElementById('val-up'),
        };

        const cards = {
            ping: document.getElementById('card-ping'),
            down: document.getElementById('card-down'),
            up: document.getElementById('card-up')
        };

        // --- State Management ---
        let isTesting = false;
        let testPhase = 'idle'; 
        let phaseTimer = 0;
        let currentVisualSpeed = 0;
        let targetSpeed = 0;
        let speedVelocity = 0;
        let graphData = [];
        const maxGraphPoints = 100;
        let simInterval = null;

        // --- Canvas Setup ---
        const speedoCanvas = document.getElementById('speedometer');
        const speedoCtx = speedoCanvas.getContext('2d');
        const graphCanvas = document.getElementById('graphCanvas');
        const graphCtx = graphCanvas.getContext('2d');

        function resizeCanvases() {
            const dpr = window.devicePixelRatio || 1;
            const sRect = speedoCanvas.parentElement.getBoundingClientRect();
            speedoCanvas.width = sRect.width * dpr;
            speedoCanvas.height = sRect.height * dpr;
            speedoCtx.scale(dpr, dpr);
            speedoCanvas.style.width = ${sRect.width}px;
            speedoCanvas.style.height = ${sRect.height}px;

            const gRect = graphCanvas.parentElement.getBoundingClientRect();
            graphCanvas.width = gRect.width * dpr;
            graphCanvas.height = gRect.height * dpr;
            graphCtx.scale(dpr, dpr);
            graphCanvas.style.width = ${gRect.width}px;
            graphCanvas.style.height = ${gRect.height}px;
        }

        window.addEventListener('resize', resizeCanvases);

        // --- Initialization ---
        function init() {
            setTimeout(() => {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    app.classList.add('loaded');
                    resizeCanvases();
                    startClock();
                    getBattery();
                    fetchNetworkInfo();
                    animationLoop();
                }, 800);
            }, 1000);
        }

        function startClock() {
            setInterval(() => {
                const now = new Date();
                clockEl.innerText = now.toLocaleTimeString('en-US', { hour12: false });
            }, 1000);
        }

        async function getBattery() {
            if (navigator.getBattery) {
                const bat = await navigator.getBattery();
                const updateBat = () => { batteryEl.innerText = ${Math.round(bat.level * 100)}%; };
                updateBat();
                bat.addEventListener('levelchange', updateBat);
            }
        }

        async function fetchNetworkInfo() {
            try {
                const res = await fetch('https://ipapi.co/json/');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('info-ip').innerText = data.ip || 'Unknown';
                    document.getElementById('info-isp').innerText = data.org || 'Unknown ISP';
                }
            } catch (e) {
                document.getElementById('info-ip').innerText = 'Offline';
                document.getElementById('info-isp').innerText = 'Local Network';
            }
        }

        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        });

        // --- Real Engine Logic ---
        async function calculateSpeed(phase) {
            const downloadURL = 'https://cscot.s3.amazonaws.com/10MB.zip'; 
            try {
                if (phase === 'down') {
                    const start = performance.now();
                    const response = await fetch(downloadURL + '?nocache=' + Math.random());
                    const reader = response.body.getReader();
                    let loaded = 0;
                    while (true) {
                        const {done, value} = await reader.read();
                        if (done) break;
                        loaded += value.byteLength;
                        const elapsed = (performance.now() - start) / 1000;
                        const mbps = (loaded * 8 / (1024 * 1024)) / elapsed;
                        targetSpeed = mbps; 
                        vals.down.innerText = mbps.toFixed(1);
                    }
                } else if (phase === 'up') {
                    const blob = new Blob([new Uint8Array(2 * 1024 * 1024)]);
                    const start = performance.now();
                    await fetch('https://httpbin.org/post', { method: 'POST', body: blob });
                    const elapsed = (performance.now() - start) / 1000;
                    const mbps = (blob.size * 8 / (1024 * 1024)) / elapsed;
                    targetSpeed = mbps;
                    vals.up.innerText = mbps.toFixed(1);
                }
            } catch (e) { console.error(e); }
        }

        async function updateSimulation() {
            if (!isTesting) return;
            if (testPhase === 'ping') {
                targetSpeed = 0;
                const start = performance.now();
                try {
                    await fetch('https://1.1.1.1', { mode: 'no-cors', cache: 'no-cache' });
                    const p = Math.round(performance.now() - start);
                    vals.ping.innerText = p;
                    vals.jitter.innerText = (Math.random() * 2 + 1).toFixed(1);
                    if (phaseTimer++ > 40) { 
                        clearInterval(simInterval); 
                        switchPhase('down');
                        await calculateSpeed('down'); 
                        switchPhase('up');
                        await calculateSpeed('up'); 
                        stopTest();
                    }
                } catch(e) { phaseTimer++; }
            }
        }

        function switchPhase(phase) {
            testPhase = phase;
            statusText.innerText = phase.toUpperCase() + " TEST";
            Object.values(cards).forEach(c => c.classList.remove('active'));
            if(cards[phase]) cards[phase].classList.add('active');
        }

        function startTest() {
            if (isTesting) { stopTest(); return; }
            isTesting = true;
            phaseTimer = 0;
            btnStart.classList.add('running');
            btnStart.innerText = "Stop Test";
            statusText.style.opacity = '1';
            vals.ping.innerText = '--'; vals.jitter.innerText = '--';
            vals.down.innerText = '--'; vals.up.innerText = '--';
            graphData = []; currentVisualSpeed = 0; targetSpeed = 0;
            switchPhase('ping');
            simInterval = setInterval(updateSimulation, 1000 / 60);
        }

        function stopTest() {
            isTesting = false;
            clearInterval(simInterval);
            testPhase = 'idle';
            targetSpeed = 0;
            btnStart.classList.remove('running');
            btnStart.innerText = "Restart Test";
            statusText.innerText = "Test Complete";
            setTimeout(() => statusText.style.opacity = '0', 2000);
            Object.values(cards).forEach(c => c.classList.remove('active'));
        }

        // --- Graphics Renderers ---
        function drawSpeedometer(speed, phase) {
            const w = speedoCanvas.width / (window.devicePixelRatio || 1);
            const h = speedoCanvas.height / (window.devicePixelRatio || 1);
            const cx = w / 2, cy = h / 2, radius = Math.min(w, h) / 2 - 20;
            speedoCtx.clearRect(0, 0, w, h);
            const startAngle = Math.PI * 0.75, endAngle = Math.PI * 2.25, angleRange = endAngle - startAngle;
            let speedRatio = speed > 0 ? Math.log10(speed + 1) / 3 : 0;
            speedRatio = Math.min(Math.max(speedRatio, 0), 1);
            const currentAngle = startAngle + (speedRatio * angleRange);
            let color = phase === 'up' ? '#7000ff' : '#00f0ff';

            speedoCtx.beginPath();
            speedoCtx.arc(cx, cy, radius, startAngle, endAngle);
            speedoCtx.lineWidth = 15; speedoCtx.strokeStyle = 'rgba(255,255,255,0.05)'; speedoCtx.lineCap = 'round';
            speedoCtx.stroke();

            if (speedRatio > 0) {
                speedoCtx.beginPath();
                speedoCtx.arc(cx, cy, radius, startAngle, currentAngle);
                speedoCtx.lineWidth = 15; speedoCtx.strokeStyle = color; speedoCtx.lineCap = 'round';
                speedoCtx.shadowBlur = 15; speedoCtx.shadowColor = color;
                speedoCtx.stroke(); speedoCtx.shadowBlur = 0;
            }

            speedoCtx.fillStyle = '#fff'; speedoCtx.font = 'bold 48px Inter'; speedoCtx.textAlign = 'center';
            speedoCtx.fillText(speed.toFixed(1), cx, cy);
            speedoCtx.fillStyle = 'rgba(255,255,255,0.5)'; speedoCtx.font = '14px Inter';
            speedoCtx.fillText(phase === 'ping' ? 'PING (ms)' : 'Mbps', cx, cy + 35);
        }

        function drawGraph() {
            const w = graphCanvas.width / (window.devicePixelRatio || 1);
            const h = graphCanvas.height / (window.devicePixelRatio || 1);
            graphCtx.clearRect(0, 0, w, h);
            if (graphData.length === 0) return;
            graphCtx.beginPath();
            const step = w / (maxGraphPoints - 1);
            let maxVal = Math.max(...graphData.map(d => d.val), 10);
            for (let i = 0; i < graphData.length; i++) {
                const x = i * step, y = h - ((graphData[i].val / maxVal) * (h * 0.8));
                if (i === 0) graphCtx.moveTo(x, y); else graphCtx.lineTo(x, y);
            }
            graphCtx.strokeStyle = testPhase === 'up' ? '#7000ff' : '#00f0ff';
            graphCtx.lineWidth = 3; graphCtx.stroke();
        }

        function animationLoop() {
            const error = targetSpeed - currentVisualSpeed;
            speedVelocity += error * 0.1; speedVelocity *= 0.85;
            currentVisualSpeed += speedVelocity;
            if (isTesting && (testPhase === 'down' || testPhase === 'up')) {
                graphData.push({ val: currentVisualSpeed });
                if (graphData.length > maxGraphPoints) graphData.shift();
            }
            drawSpeedometer(currentVisualSpeed, testPhase);
            drawGraph();
            requestAnimationFrame(animationLoop);
        }

        btnStart.addEventListener('click', startTest);
        window.onload = init;
    </script>
